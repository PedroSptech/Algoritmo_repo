<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Exercício 10</title>
</head>

<body>
    <button onclick="sortearJ1()">Dado Jogador 1</button>
    <div id="res_j1"></div>
    <button onclick="sortearJ2()">Dado Jogador 2</button>
    <div id="res_j2"></div>
    <button onclick="comparar()">Comparar Resultados</button>
    <div id="final"></div>

    <script>
        let d1 = 0;
        let d2 = 0;

        function sortearJ1() {
            d1 = Math.floor(Math.random() * 6) + 1;
            res_j1.innerHTML = d1;
        }

        function sortearJ2() {
            d2 = Math.floor(Math.random() * 6) + 1;
            res_j2.innerHTML = d2;
        }

        function comparar() {
            let msg = "";
            if (d1 > d2) msg = "Jogador 1 venceu";
            else if (d2 > d1) msg = "Jogador 2 venceu";
            else msg = "Empate!";
            final.innerHTML = msg;
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Exercício 13</title>
</head>

<body>
    <button onclick="sortearTemp()">Sortear temperatura</button>
    <div id="resultado"></div>

    <script>
        function sortearTemp() {
            let temp = Math.floor(Math.random() * 41) - 20;
            let msg = "";

            if (temp < 1) msg = "Dá pra conservar qualquer alimento";
            else if (temp <= 10) msg = "Conserva a maioria dos alimentos";
            else msg = "Estraga a maioria dos alimentos";

            resultado.innerHTML = `Temperatura sorteada: ${temp} <br> ${msg}`;
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Exercício 14</title>
</head>

<body>
    <button onclick="verLua()">Ver a Lua</button>
    <div id="resultado"></div>

    <script>
        function verLua() {
            let dia = Math.floor(Math.random() * 31) + 1;
            let fase = "";

            if (dia <= 7) fase = "Lua nova";
            else if (dia <= 16) fase = "Lua cheia";
            else if (dia <= 22) fase = "Lua minguante";
            else fase = "Lua crescente";

            resultado.innerHTML = `Dia: ${dia} - <b>${fase}</b>`;
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Exercício 15</title>
</head>

<body>
    <p>Números pares: <span id="span_par">0</span></p>
    <p>Números ímpares: <span id="span_impar">0</span></p>
    <button onclick="sortear()">Sortear número</button>
    <div id="res"></div>

    <script>
        let pares = 0;
        let impares = 0;

        function sortear() {
            let num = Math.floor(Math.random() * 22) - 30;

            if (num % 2 == 0) {
                pares++;
                span_par.innerHTML = pares;
            } else {
                impares++;
                span_impar.innerHTML = impares;
            }
            res.innerHTML = `Sorteado: ${num}`;
        }
    </script>
</body>

</html>

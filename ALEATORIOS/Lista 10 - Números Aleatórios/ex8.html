<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Exercício 8</title>
</head>

<body>
    <button onclick="gerarNota()">Gerar uma nota de aluno entre 0 e 10</button>
    <div id="div_nota"></div>
    <button onclick="gerarFreq()">Gerar uma frequência de aluno entre 0 e 100</button>
    <div id="div_freq"></div>
    <br>
    <button onclick="verSituacao()">Ver Situação</button>

    <script>
        let notaGlobal = 0;
        let freqGlobal = 0;

        function gerarNota() {
            notaGlobal = Math.random() * 10;
            div_nota.innerHTML = notaGlobal.toFixed(2);
        }

        function gerarFreq() {
            freqGlobal = Math.random() * 100;
            div_freq.innerHTML = freqGlobal.toFixed(2);
        }

        function verSituacao() {
            alert(`Nota: ${notaGlobal.toFixed(2)} | Frequência: ${freqGlobal.toFixed(2)}`);
        }
    </script>
</body>

</html>

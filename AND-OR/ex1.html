<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="id_nota">Pergunte a nota para o atendimento:</label>
    <input type="number" id="id_nota" placeholder="Digite sua nota">
    <button onclick="Calc_nota()">Avaliar atendimento</button>
    <h3 id="id_resultado"></h3>
</body>
<script>
function Calc_nota(){
    let nota = Number(id_nota.value)
    if(nota < 0 || nota > 10){
        id_resultado.innerHTML = `Nota inválida`
    }else if(nota < 5){
        id_resultado.innerHTML = `Não aprovado`
    }else if(nota >= 5 && nota <= 6 ){
        id_resultado.innerHTML = `Neutro`  
    }else if(nota > 6){
        id_resultado.innerHTML = `Aprovado`
    }
}
</script>
</html>

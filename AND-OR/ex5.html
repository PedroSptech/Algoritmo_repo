<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="number" id="id_temp">
    <input type="text" id="id_umidade">
    <br>
    <br>
    <button onclick="Avaliar_clima()">Avaliar clima</button>
    <br>
    <p id="id_resultado"></p>
</body>
    <script>
        function Avaliar_clima(){    
            let temperatura = Number(id_temp.value);
            let umidade = Number(id_umidade.value);

            if(umidade < 0 || umidade > 100){
                alert("Valor de umidade inválido")
                id_resultado.innerHTML = ``
            }else if((temperatura >= 22 && temperatura <= 23) && (umidade > 60)){
                id_resultado.innerHTML = `Clima agradável`
            }else{
                id_resultado.innerHTML = `Clima desconfortável`
            }
        }
    </script>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="number" id="id_pessoas_carro">
    <button onclick="analisar()">#Partiu Carona</button>
    <div id="resultado"></div>
</body>
    <script>
        function analisar(){
            let num_pes = Number(id_pessoas_carro.value)

            for(let i = 1; i <= num_pes; i++){
                if(i == 1){
                    resultado.innerHTML += `<br>Entrou o 1º passageiro  (que é o(a) motorista)<br>`
                    i++
                }if(i <= 5){
                    resultado.innerHTML += `<br>Entrou o ${i}º passageiro<br>`
                }else{
                    resultado.innerHTML += `<br>O ${i}º passageiro terá que esperar!<br>`
                }
            }
        }
    </script>
</html>

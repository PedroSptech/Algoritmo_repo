<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="number" id="id_deposito">
    <input type="number" id="id_valor">
    <button onclick="Calcular()">Acompanhar grana</button>
    <div id="resultado"></div>
    <div id="id_bonus"></div>
    <hr>
</body>
    <script>
        function Calcular(){
            let deposito = Number(id_deposito.value)
            let valor = Number(id_valor.value)
            let total = Number(0)
            let voltas = Number(0)


            for(let i = 1; i <= deposito; i++){
                voltas++
                total = valor + total
                if(voltas == 3){
                    total = (total * 0.01) + total
                    voltas = 0
                    resultado.innerHTML += `<br>${i} Mês: R$${total.toFixed(2)}<img style="width: 12px; height: 12px;" src="/assets/estrela.jpg" alt="Estrela de bônus"> <br>` 
                }else{
                    resultado.innerHTML += `<br>${i} Mês: R$${total.toFixed(2)}<br>`
                }
                
            
            }resultado.innerHTML += `<br>Total guardado: ${total.toFixed(2)}<br>`

        }
    </script>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="number" id="id_peso" placeholder="Insira o peso da criança">
    <button onclick="Calc_peso()">Calcular</button>
    <h3 id="id_resultado"></h3>
</body>
<script>
    function Calc_peso(){
        let peso = Number(id_peso.value)
    if(peso === 18.3){
        id_resultado.innerHTML = `Peso perfeito`
    } 
    else if(peso < 13.5){
        id_resultado.innerHTML = `Abaixo do peso`
    } 
    else if(peso > 21.2){
        id_resultado.innerHTML = `Acima do peso`
    } 
    else if(peso >= 13.5 && peso <= 21.2){
        id_resultado.innerHTML = `Peso na média`
    }
}
</script>
</html>

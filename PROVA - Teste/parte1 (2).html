<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <h1>Calculadora SPFlix</h1>

  <div>
    <p>Qualidade (720p ou 1080p ou 4K):</p>
    <input type="text" id="ipt_qualidade">
  </div>

  <div style="display: flex; gap: 50px">
    <div>
      <p>Telas simultâneas - Na mesma casa:</p>
      <input type="text" id="ipt_qtd_telas">
    </div>

    <div>
      <p>Telas extras - Fora da residência:</p>
      <input type="text" id="ipt_qtd_telas_extras">
    </div>
  </div>

  <div>
    <p>Quer fazer download ('sim' ou 'nao'):</p>
    <input type="text" id="ipt_download">
  </div>

  <p></p>
  <button onclick="exibirResultado()">Exibir Resultado</button>

  <p></p>
  <div id="div_mensagem"></div>

</body>

</html>
<script>
  function exibirResultado() {
    let qualidade = ipt_qualidade.value
    let telas = Number(ipt_qtd_telas.value)
    let telas_extras = Number(ipt_qtd_telas_extras.value)
    let total
    let cal_tela_extra = telas_extras * 12.90
    let valor_base

    if (qualidade == '720p') {
      valor_base = 15
    } else if (qualidade == '1080p') {
      valor_base = 20
    } else if (qualidade == '4K') {
      valor_base = 25
    }

    if (telas > 0 && telas <= 2) {
      total = 10 + cal_tela_extra
    } else if (telas >= 3 && telas <= 4) {
      total = 20 + cal_tela_extra
    } else if (telas > 4) {
      total = 30 + cal_tela_extra
    }
    let telas_total = telas+telas_extras
    let valor_total = valor_base + total

    let Calc_divisao = valor_total / telas_total
    

    div_mensagem.innerHTML = `O valor base do seu plano é R$${valor_base}<br>O valor das telas do seu plano é R$${total}<br> Valor final: R$${valor_total}<br> Se quiser dividir fica R$${Calc_divisao.toFixed(2)} para cada!`

  }
</script>

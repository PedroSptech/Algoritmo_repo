<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <h1>Calculadora SPFlix</h1>

  <div>
    <p>Qualidade (720p ou 1080p ou 4K):</p>
    <input type="text" id="ipt_qualidade">
  </div>

  <div style="display: flex; gap: 50px">
    <div>
      <p>Telas simultâneas - Na mesma casa:</p>
      <input type="text" id="ipt_qtd_telas">
    </div>

    <div>
      <p>Telas extras - Fora da residência:</p>
      <input type="text" id="ipt_qtd_telas_extras">
    </div>
  </div>

  <div>
    <p>Quer fazer download ('sim' ou 'nao'):</p>
    <input type="text" id="ipt_download">
  </div>

  <p></p>
  <button onclick="exibirResultado()">Exibir Resultado</button>

  <p></p>
  <div id="div_mensagem"></div>

</body>

</html>
<script>
  function exibirResultado() {
    let qualidade = ipt_qualidade.value
    let telas = Number(ipt_qtd_telas.value)
    let telas_extras = Number(ipt_qtd_telas_extras.value)
    let download = ipt_download.value
    let total
    let cal_tela_extra = telas_extras * 12.90
    let valor_base

    if (qualidade == '720p') {
      valor_base = 15
    } else if (qualidade == '1080p') {
      valor_base = 20
    } else if (qualidade == '4K') {
      valor_base = 25
    }

    if (telas > 0 && telas <= 2) {
      total = 10 + cal_tela_extra
    } else if (telas >= 3 && telas <= 4) {
      total = 20 + cal_tela_extra
    } else if (telas > 4) {
      total = 30 + cal_tela_extra
    }
  let telas_total = telas + telas_extras
  let valor_total = valor_base + total

  let texto 
  
  let adc_valor
  
  if(download == 'sim'){
    let acres = 0.05 + (0.01 * telas_total) 
    let total_acres = valor_total * acres
    texto = `Você optou por fazer download e por isso sua conta irá subir em ${(acres * 100).toFixed(0)}%`
    adc_valor = valor_total + total_acres
    }else{
    let total_acres = valor_total * 0.10
    texto = `Você optou por não fazer download e por isso sua conta será reduzida em 10%`
    adc_valor = valor_total - total_acres
    }

    let Calc_divisao = adc_valor / telas_total 

    

    div_mensagem.innerHTML = `O valor base do seu plano é R$${valor_base}<br>O valor das telas do seu plano é R$${total}<br>${texto} <br>Valor final: R$${adc_valor}<br> Se quiser dividir fica R$${Calc_divisao.toFixed(2)} para cada!`

  }
</script>

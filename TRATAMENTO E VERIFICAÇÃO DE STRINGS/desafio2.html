<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input type="text" id="ipt_venc1">
    <input type="text" id="ipt_venc2">
    <input type="text" id="ipt_venc3">
    <input type="text" id="ipt_venc4">
    <input type="text" id="ipt_venc5">

    <button onclick="resultado()">Exibir resultado</button>

    <div id="res"></div>
    <p id="id_resultado"></p>
    <br>
    <hr>
    <br>
    <h2>Meus Campeões</h2>
    <input type="text" id="id_novo_camp">
    <button onclick="adcionar()"> Adicionar</button>
    <div id="id_resultado_novo"></div>
    <br>
    <hr>
    <br>
    <h3>Buscar</h3>
    <input type="text" id="id_busca">
    <button onclick="buscar()">Pesquisar</button>
    <div id="id_busca_nome"></div>
</body>
<script>
    let nomes = ["Pedro", "Jacob", "Vitor", "Lucas", "Miguel"]
    function resultado() {
        
        let count_certo = 0
        let count_errado = 0
        let nome_certos = []
        let nomes_errados = []
        let pessoa1 = ipt_venc1.value
        let pessoa2 = ipt_venc2.value
        let pessoa3 = ipt_venc3.value
        let pessoa4 = ipt_venc4.value
        let pessoa5 = ipt_venc5.value
        
        if (pessoa1 == nomes[0]) {
            count_certo++
            nome_certos.push(pessoa1) 
        }else{
            nomes_errados.push(pessoa1)
            count_errado++  
        } if (pessoa2 == nomes[1]) {
            count_certo++
            nome_certos.push(pessoa2)
        }else{
            nomes_errados.push(pessoa2)
            count_errado++
        } if (pessoa3 == nomes[2]) {
            count_certo++
            nome_certos.push(pessoa3)
        }else{
            nomes_errados.push(pessoa3)
            count_errado++
        } if (pessoa4 == nomes[3]) {
            count_certo++
            nome_certos.push(pessoa4)
        }else{
            nomes_errados.push(pessoa4)
            count_errado++
        } if (pessoa5 == nomes[4]) {
            count_certo++
            nome_certos.push(pessoa5)
        }else{
            nomes_errados.push(pessoa5)
            count_errado++
        }
        res.innerHTML = `
                <br>Você acertou ${count_certo} <br>
                Você errou ${count_errado} <br>
                Você acertou esses nomes ${nome_certos}<br> 
                Você errou esses nomes ${nomes_errados}
                `
        if(count_certo > 2){
            id_resultado.innerHTML = `Você conhece bem essa competição!`
        }else{
            id_resultado.innerHTML = `Você precisa acompanhar mais essa competição!`
        }
        let upper = nomes[0].toUpperCase
         res.innerHTML += `<br>${upper}🥇`

    }
    let novo_nome = []
    function adcionar(){
        let novo_camp = id_novo_camp.value
    
        novo_nome.push(novo_camp)

        id_resultado_novo.innerHTML = `Novos Campeões: ${novo_nome}`
    }

   function buscar(){
    let nome_busca = id_busca.value

    if(novo_nome.includes(nome_busca) && nomes.includes(nome_busca)){
        id_busca_nome.innerHTML = `O nome está em ambas as listas`
        
    }else if(novo_nome.includes(nome_busca)){
        id_busca_nome.innerHTML = `O nome está na lista do usuário`
        
    }else if(nomes.includes(nome_busca)){
        id_busca_nome.innerHTML = `O nome está na lista do sistema`
        
    }else{
        id_busca_nome.innerHTML = `O nome não está em nenhuma das listas`
    }
}
</script>

</html>

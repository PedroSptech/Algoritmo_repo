<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=[device-width], initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="ipt_fruta">
    <button onclick="exibir()">Exibir</button>
    <button onclick="adcionar()">Adcionar</button>
    <br>
    <br>
    
    <div id="resultado"></div>
</body>
<script>
    let frutas = ["Melão", "Maça", "Maracuja", "Melancia", "Banana", "Kiwi"];
        function exibir(){
            
            let tamanho = frutas.length;
            let primeiraFruta = frutas[0]
            let ultimaFruta = frutas[tamanho - 1]
            resultado.innerHTML = `
            Sua lista tem ${tamanho} frutas <br>
            A primeira fruta é ${primeiraFruta} <br>
            A ultima Fruta é ${ultimaFruta} <br> 
            Frutas: ${frutas}
            `
        }

        function adcionar(){
            let fruta = ipt_fruta.value
            frutas.push(fruta);

            resultado.innerHTML += `<br> Vetor atualizado: ${frutas}`
        }
</script>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="ipt_nome" placeholder="Digite o nome">
    <input type="text" id="ipt_nota" placeholder="Digite a nota">

    <button onclick="cadastrar()">Registrar aluno</button>

    <div id="resultado"></div>
</body>
    <script>
        function cadastrar(){
            let alunos = []
            let nome = ipt_nome.value
            let nota = Number(ipt_nota.value)

            let aluno = {
                "nome": nome,
                "nota": nota
            }

            alunos.push(aluno)

            console.log(alunos)

            for(let i = 0; i< alunos.length; i++){
                resultado.innerHTML += `Nome do aluno: ${alunos[i].nome}<br> `
                resultado.innerHTML += `Nota do aluno: ${alunos[i].nota}<br><br> 
                <hr>
                `
            }
            
            
        }
    </script>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="number" id="id_voltas">
    <button onclick="voltas()">Iniciar corrida!</button>
    <br>
    <br>
    <duv id="resultado"></duv>
</body>
    <script>
        function voltas(){
            resultado.innerHTML = ""

            let voltas = Number(id_voltas.value)
            let i = 1
            while(i <= voltas){
                resultado.innerHTML += `<br>Carro dando a ${i}ª volta<br>`
                i++
            }resultado.innerHTML += "<br>Corrida finalizada!"
        }
    </script>
</html>

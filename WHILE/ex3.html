<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="id_input" placeholder="Diga algo sobre a matéria de Algoritmos">
    <br>
    <button onclick="Materia()">VEJA</button>
    <br>
    <div id="resultado"></div>
</body>
    <script>
        function Materia(){
            let mensagem = id_input.value
            let i = 1
            while(i <=  7){
                resultado.innerHTML += `<br>${i}° ${mensagem}<br>`
                i++
            }
        }
    </script>
</html>

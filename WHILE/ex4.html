<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="Calculo()">S2 Pares</button>
    <div id="resultado"></div>
</body>
    <script>
        let i = 1
        function Calculo(){
            while(i <= 100){
                if(i % 2 === 0){
                    resultado.innerHTML += `<br>${i}<br>`
                }
            i++
            }
    }
    </script>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="cabalisticos()">Números cabalísticos</button>
    <div id="resultado"></div>
</body>
    <script> 
        let i = 1
        let cabal = [3, 4, 7, 10,12]
        function cabalisticos(){
            while(i <= 30){
                if(cabal.includes(i)){
                    resultado.innerHTML += ``
                }else{
                    resultado.innerHTML += `<br>${i}`
                }
                i++
            }
        }
    </script>
</html>

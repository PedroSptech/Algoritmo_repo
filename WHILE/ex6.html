<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="number" id="id_num">
    <button onclick="calc()">Adoro múltiplos de 5</button>
    <div id="resultado"></div>
</body>
    <script>
        let i = 1
        function calc(){
            let num = Number(id_num.value)
            if(num < 20 || num > 100){
                resultado.innerHTML = `Digite um número entre 20 e 100`
            }else{
                resultado.innerHTML += `<b><br>${num}<br><b>`
                while(i <= num){  
                        resultado.innerHTML += `<br>${i * 5}<br>`
                        i++
                } 
                
            }
            
        }
    </script>
</html>

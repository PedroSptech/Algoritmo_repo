<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="number" id="id_num" placeholder="Insira um número">
    <br>
    <input type="text" id="id_frase" placeholder="Insira uma frase">
    <br>
    <button onclick="papagaio()">Papagaio</button>
    <br>
</body>
    <script>
        function papagaio(){
            let num = Number(id_num.value)
            let frase = id_frase.value
            let i = 1
            while(i <= num){
                alert(frase)
                i++
            }
        }
    </script>
</html>

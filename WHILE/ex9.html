<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="id_frase">
    <button onclick="pares()">S2 Pares</button>
    <div id="resultado"></div>
</body>
    <script>
    function pares(){
    resultado.innerHTML = "";
    let i = 0
    let num = Number(id_frase.value)

        while(i < num){
            if(i % 2 == 0){
                resultado.innerHTML += `${i}<br>`
            } i++
        } 
    }
    </script>
</html>

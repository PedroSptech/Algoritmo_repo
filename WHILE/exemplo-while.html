<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="resultado"></div>
</body>
    <script>
        let contador = 0;

        while(contador <= 100){
            resultado.innerHTML += `<br> O contador é ${contador} <br>`
            contador++
        }
          resultado.innerHTML += `<br><br>Agora o contador B<br><br>`
        for(let i = 0; i < 9; i++){
            resultado.innerHTML += `<br> O contador é ${contador} <br>`
        }
    </script>
</html>
